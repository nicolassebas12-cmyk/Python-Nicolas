{% extends "base.html" %}

{% block content %}
<a href="/create">Nuevo Producto</a>
<table border="1">
<tr>
    <th>ID</th>
    <th>Nombre</th>
    <th>Precio</th>
    <th>Acciones</th>
</tr>

{% for p in products %}
<tr>
    <td>{{ p.id }}</td>
    <td>{{ p.name }}</td>
    <td>{{ p.price }}</td>
    <td>
        <a href="/edit/{{ p.id }}">Editar</a>
        <a href="/delete/{{ p.id }}">Eliminar</a>
    </td>
</tr>
{% endfor %}
</table>
{% endblock %}
