{% extends "base.html" %}

{% block content %}
<h2>Crear Producto</h2>

<form method="POST">
    Nombre: <input type="text" name="name"><br>
    Precio: <input type="number" step="0.01" name="price"><br>
    Descripción: <input type="text" name="description"><br>
    <button type="submit">Guardar</button>
</form>
{% endblock %}
